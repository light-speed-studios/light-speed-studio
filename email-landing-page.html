<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - You're on the list!</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap');

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: #040e15;
      overflow-x: hidden;
    }

    body {
      padding-top: 61px;
      font-family: Rajdhani, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    /* --- LSS NAVIGATION --- */
    .lss-nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 99999;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 10px 5vw;

      background: rgba(4,14,21,.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);

      border-bottom: 1px solid #1a2a3a;

      box-shadow:
        0 6px 22px rgba(0,0,0,.42);
    }

    .lss-nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0.1em;
      font-size: 1.2rem;
    }

    .lss-nav-logo img {
      height: 40px;
      width: auto;
      display: block;
    }

    .lss-brand-text {
      margin-left: 12px;
      font-family: 'Oxanium', sans-serif;
      font-weight: 400;
      font-size: 1rem;
      color: #BAC7D5;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .lss-nav-links {
      display: flex;
      gap: 30px;
    }

    .lss-nav-item {
      margin-left: 12px;
      font-family: 'Oxanium', sans-serif;
      font-weight: 400;
      font-size: 1rem;
      color: #BAC7D5;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: color 0.2s ease;
    }

    .lss-nav-item:hover {
      color: #00aede;
    }

    .hamburger {
      display: none;
      font-size: 24px;
      cursor: pointer;
      color: #BAC7D5;
    }

    .lss-watch-page {
      --site-bg: #040e15;
      --panel-bg: rgba(4, 14, 21, 0.86);
      --cyan: #00aede;
      --text-main: #bac7d5;
      --text-soft: rgba(186, 199, 213, 0.72);

      width: 100%;
      min-height: calc(100vh - 61px);
      padding: 30px 20px 38px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-direction: column;
      background:
        radial-gradient(circle at 50% 0%, rgba(0, 174, 222, 0.06), transparent 34%),
        #040e15;
      font-family: Rajdhani, Arial, sans-serif;
      overflow-x: hidden;
    }

    .lss-watch-page * {
      box-sizing: border-box;
    }

    .lss-watch-shell {
      width: min(900px, 92vw);
      margin: 0 auto;
      margin-top: 0px;
    }

    .watch-header {
      position: relative;
      padding: 28px;
      background:
        linear-gradient(90deg, rgba(0, 174, 222, 0.11), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.018)),
        var(--panel-bg);
      box-shadow:
        inset 0 0 0 1px rgba(0,174,222,.22),
        0 0 28px rgba(0,0,0,.28);
      overflow: hidden;
    }

    .watch-header::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(var(--cyan), var(--cyan)) left top / 42px 2px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) left top / 2px 42px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) right top / 42px 2px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) right top / 2px 42px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) left bottom / 42px 2px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) left bottom / 2px 42px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) right bottom / 42px 2px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) right bottom / 2px 42px no-repeat;
      opacity: .64;
    }

    .watch-header > * {
      position: relative;
      z-index: 2;
    }

    .watch-kicker {
      display: block;
      margin-bottom: 10px;
      font-family: Oxanium, sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--cyan);
    }

    .watch-header h1 {
      margin: 0 0 18px;
      font-family: Oxanium, sans-serif;
      font-size: clamp(30px, 3vw, 42px);
      font-weight: 800;
      line-height: 1;
      color: var(--text-main);
      text-shadow:
        0 0 16px rgba(0,174,222,.14),
        0 5px 22px rgba(0,0,0,.45);
    }

    .watch-text {
      font-size: 20px;
      line-height: 1.7;
      color: var(--text-soft);
    }

    .watch-text p {
      margin: 0 0 18px;
    }

    .watch-text p:last-child {
      margin-bottom: 0;
    }

    .action-container {
      margin-top: 32px !important;
      text-align: center;
    }

    .back-link {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 700;
      font-family: Oxanium, sans-serif;
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
      border: 1px solid rgba(0, 174, 222, 0.4);
      padding: 10px 20px;
      background: rgba(0, 174, 222, 0.05);
      transition: all 0.2s ease;
      display: inline-block;
      cursor: pointer;
    }

    .back-link:hover {
      background: rgba(0, 174, 222, 0.15);
      box-shadow: 0 0 12px rgba(0, 174, 222, 0.3);
      border-color: var(--cyan);
    }

    @media (max-width: 900px) {
      .lss-brand-text {
        display: none;
      }

      .lss-nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 61px;
        left: 0;
        width: 100%;
        background: #040E15;
        padding: 20px;
        text-align: center;
        border-bottom: 2px solid #00aede;
        z-index: 1000;
      }

      .lss-nav-links.active {
        display: flex;
      }

      .hamburger {
        display: block;
      }
    }

    @media (max-width:700px) {
      .lss-watch-page {
        padding: 20px 12px 16px;
      }

      .watch-header {
        padding: 20px;
      }

      .watch-kicker {
        font-size: 13px;
      }

      .watch-header h1 {
        font-size: 24px;
      }

      .watch-text {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

<header class="lss-nav-bar">
  <a class="lss-nav-logo" href="index.html">
    <img alt="Light Speed Studios" src="https://light-speed-studios.b-cdn.net/topheaderlogo%20copy.png"/>
    <span class="lss-brand-text">No Spectacle Without Soul</span>
  </a>

  <div class="hamburger">☰</div>

  <nav class="lss-nav-links">
    <a class="lss-nav-item" href="index.html">Bridge</a>
    <a class="lss-nav-item" href="vault.html">Vault</a>
    <a class="lss-nav-item" href="lab.html">Lab</a>
    <a class="lss-nav-item" href="pulse.html">Pulse</a>
    <a class="lss-nav-item" href="telemetry.html">Telemetry</a>
  </nav>
</header>

  <div class="lss-watch-page">
    <div class="lss-watch-shell">
      <div class="watch-header">
        <h1>You're on the list!</h1>
        <span class="watch-kicker">THANK YOU for signing up</span>

        <div class="watch-text">
          <p>
            You will now receive twice-monthly updates. Though, to be honest, I sometimes forget, so it may only be once a month. Either way, no SPAM!
          </p>

          <p class="action-container">
            <a href="index.html" class="back-link">
              RETURN TO STUDIO ⤴︎
            </a>
          </p>
        </div>

      </div>
    </div>
  </div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const hamburger = document.querySelector(".hamburger");
    const navLinks = document.querySelector(".lss-nav-links");

    if (hamburger && navLinks) {
      hamburger.addEventListener("click", function () {
        navLinks.classList.toggle("active");
      });
    }
  });
</script>

</body>
</html>
